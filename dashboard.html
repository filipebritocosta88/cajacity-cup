<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

header{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
}

.lista{
margin-top:20px;
}

.item{
background:#0f172a;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>🏆 Cajacity Cup</header>

<div class="card">

<h3>Criar Campeonato</h3>

<input id="nomeCamp" placeholder="Nome do campeonato">

<select id="console">
<option>PS3</option>
<option>PS4</option>
<option>PS5</option>
<option>Xbox 360</option>
</select>

<select id="jogo">
<option>PES 2018</option>
<option>FIFA 2019</option>
<option>Efootball 2026</option>
<option>FIFA 2025</option>
<option>FIFA 2026</option>
</select>

<select id="formato">
<option>Liga</option>
<option>Mata-mata</option>
<option>Liga + Mata-mata</option>
</select>

<button onclick="criarCampeonato()">Criar campeonato</button>

</div>

<div class="card">

<h3>Campeonatos</h3>

<div id="lista"></div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>

</html>
