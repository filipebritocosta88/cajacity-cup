<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Cajacity Cup</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">Cajacity Cup</div>
        <div class="user-avatar-container" onclick="toggleMenu()">
            <img src="https://via.placeholder.com/40" alt="Avatar" class="user-avatar" id="header-avatar">
            <div class="avatar-menu" id="avatar-menu">
                <a href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
                <a href="#"><i class="fas fa-cog"></i> Configurações</a>
                <a href="#"><i class="fas fa-history"></i> Histórico</a>
                <a href="#" onclick="logout()" style="color: var(--accent); border-top: 1px solid #333;"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 20px;">Olá, <span id="user-welcome" style="color: var(--primary);">Jogador</span>!</h2>

        <div class="card-campeonato" style="border-left-color: var(--secondary);">
            <h3 style="margin-bottom: 15px;"><i class="fas fa-plus-circle"></i> Novo Campeonato</h3>
            <div class="form-group">
                <input type="text" id="camp-nome" placeholder="Nome do Campeonato (Ex: Copa Verão)">
            </div>
            <div class="form-group">
                <select id="camp-console">
                    <option value="" disabled selected>Escolha o Console</option>
                    <option value="PS3">PlayStation 3</option>
                    <option value="PS4">PlayStation 4</option>
                    <option value="PS5">PlayStation 5</option>
                    <option value="Xbox">Xbox</option>
                </select>
            </div>
            <div class="form-group">
                <select id="camp-jogo">
                    <option value="" disabled selected>Escolha o Jogo</option>
                    <option value="PES 2018">PES 2018</option>
                    <option value="eFootball">eFootball</option>
                    <option value="FIFA 23">FIFA 23</option>
                    <option value="EA Sports FC">EA Sports FC</option>
                </select>
            </div>
            <div class="form-group">
                <select id="camp-formato">
                    <option value="Liga">Apenas Liga</option>
                    <option value="Liga + Mata-mata">Liga + Mata-mata</option>
                </select>
            </div>
            <button class="btn-primary" id="btn-criar-camp">Criar Agora</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #222; margin: 30px 0;">

        <h3 style="margin-bottom: 15px;">Campeonatos Ativos</h3>
        <div id="lista-campeonatos">
            <p style="color: #666; text-align: center;">Carregando campeonatos...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-trophy"></i>
            <span>Torneios</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-chart-line"></i>
            <span>Ranking</span>
        </a>
        <a href="perfil.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>

    <script>
        function toggleMenu() {
            document.getElementById('avatar-menu').classList.toggle('active');
        }
    </script>
</body>
</html>
