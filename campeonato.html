<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena | Cajacity Cup</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='dashboard.html'">Cajacity Cup</div>
        <img src="https://via.placeholder.com/40" class="user-avatar" id="header-avatar">
    </header>

    <div class="container">
        <div id="camp-info-top" style="text-align: center; margin-bottom: 20px;">
            <span class="game-badge" id="detalhe-jogo">---</span>
            <h2 id="detalhe-nome">---</h2>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn-primary" style="flex:1" onclick="switchTab('tab-tabela')">Tabela</button>
            <button class="btn-primary" style="flex:1; background:#1a1f26" onclick="switchTab('tab-jogadores')">Players</button>
            <button id="btn-admin-tab" class="btn-primary hidden" style="flex:1; background:var(--accent)" onclick="switchTab('tab-admin')">Convidar</button>
        </div>

        <div id="tab-jogadores" class="tab-content hidden">
            <div class="card-campeonato">
                <h3>Participantes Confirmados</h3>
                <div id="lista-players-camp"></div>
            </div>
        </div>

        <div id="tab-admin" class="tab-content hidden">
            <div class="card-campeonato">
                <h3>Buscar Jogadores no Sistema</h3>
                <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">Clique no jogador para enviar convite</p>
                <div id="lista-todos-usuarios" style="max-height: 300px; overflow-y: auto;">
                    </div>
            </div>
        </div>

        <div id="tab-tabela" class="tab-content">
            <div id="tabela-placeholder" class="card-campeonato">Aguardando início do campeonato...</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="perfil.html" class="nav-item"><i class="fas fa-user"></i><span>Perfil</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/campeonato.js"></script>
</body>
</html>
