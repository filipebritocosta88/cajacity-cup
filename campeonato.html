<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campeonato</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

header{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
}

.jogador{
background:#0f172a;
padding:12px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<header>🏆 Campeonato</header>

<div class="card">

<h3>Escolher Time</h3>

<select id="time">

<option>Real Madrid</option>
<option>Barcelona</option>
<option>Manchester City</option>
<option>PSG</option>
<option>Bayern</option>

</select>

<button onclick="escolherTime()">Confirmar</button>

</div>

<div class="card">

<h3>Jogadores</h3>

<div id="jogadores"></div>

</div>

<script type="module" src="js/campeonato.js"></script>

</body>

</html>
