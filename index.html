<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cajacity Cup | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container" style="margin-top: 50px;">
        <div class="text-center" style="margin-bottom: 40px;">
            <h1 class="logo" style="font-size: 2.5rem;">Cajacity Cup</h1>
            <p style="color: #888;">A elite do videogame está aqui.</p>
        </div>

        <div class="card-campeonato" id="login-section">
            <h3 style="margin-bottom: 20px;">Entrar na Arena</h3>
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Seu e-mail">
            </div>
            <div class="form-group">
                <input type="password" id="login-senha" placeholder="Sua senha">
            </div>
            <button class="btn-primary" id="btn-entrar">Entrar</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                Não tem conta? <a href="#" id="show-register" style="color: var(--primary); text-decoration: none;">Cadastre-se</a>
            </p>
        </div>

        <div class="card-campeonato hidden" id="register-section">
            <h3 style="margin-bottom: 20px;">Criar Conta de Jogador</h3>
            <div class="form-group">
                <input type="text" id="reg-nome" placeholder="Nome de Jogador (Ex: Filipe)">
            </div>
            <div class="form-group">
                <input type="email" id="reg-email" placeholder="E-mail">
            </div>
            <div class="form-group">
                <input type="password" id="reg-senha" placeholder="Senha">
            </div>
            <button class="btn-primary" id="btn-cadastrar">Criar Conta</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                Já é da casa? <a href="#" id="show-login" style="color: var(--primary); text-decoration: none;">Fazer Login</a>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Alternar entre Login e Registro
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.remove('hidden');
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
        });
    </script>
</body>
</html>
