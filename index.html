<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cajacity Cup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:90%;
max-width:380px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.logo{
font-size:26px;
font-weight:600;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.secondary{
background:#3b82f6;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🏆 Cajacity Cup</div>

<input id="email" placeholder="Seu email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<button class="secondary" onclick="criarConta()">Criar conta</button>

</div>

<script type="module" src="js/auth.js"></script>

</body>

</html>
