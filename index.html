<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Cajacity Cup</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:100px;
}

.box{
background:#1e293b;
width:350px;
margin:auto;
padding:40px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🏆 Cajacity Cup</h1>

<div class="box">

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="criarConta()">Criar conta</button>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
