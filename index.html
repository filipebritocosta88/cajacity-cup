<!DOCTYPE html>
<html>

<head>

<title>Jogadores - Cajacity Cup</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.box{
background:#1e293b;
padding:20px;
width:400px;
margin:auto;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
width:80%;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
background:#1e293b;
}

td,th{
padding:10px;
}

</style>

</head>

<body>

<h1>🏆 Cajacity Cup</h1>

<h2>Cadastrar Jogador</h2>

<div class="box">

<input id="nome" placeholder="Nome do jogador">

<input id="time" placeholder="Time escolhido">

<button onclick="cadastrar()">Cadastrar</button>

</div>

<h2>Jogadores</h2>

<table border="1">

<thead>

<tr>

<th>Jogador</th>
<th>Time</th>

</tr>

</thead>

<tbody id="lista"></tbody>

</table>

<script>

let jogadores = []

function cadastrar(){

let nome = document.getElementById("nome").value
let time = document.getElementById("time").value

jogadores.push({nome,time})

atualizar()

}

function atualizar(){

let tabela = document.getElementById("lista")

tabela.innerHTML=""

jogadores.forEach(j=>{

tabela.innerHTML +=

`<tr>

<td>${j.nome}</td>
<td>${j.time}</td>

</tr>`

})

}

</script>

</body>

</html>
